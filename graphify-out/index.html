<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Graphify Output</title>
  <meta http-equiv="refresh" content="0; url=./graph.html" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Segoe UI, Tahoma, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }
    .card {
      max-width: 640px;
      padding: 24px;
      border-radius: 12px;
      background: #111827;
      border: 1px solid #334155;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 1.25rem;
    }
    p {
      margin: 0 0 14px;
      line-height: 1.4;
      color: #cbd5e1;
    }
    a {
      color: #93c5fd;
      text-decoration: none;
      margin-right: 12px;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Graphify Output</h1>
    <p>Redirecting to the interactive graph view...</p>
    <p>
      <a href="./graph.html">Open graph.html</a>
      <a href="./graph.json">Open graph.json</a>
      <a href="./GRAPH_REPORT.md">Open GRAPH_REPORT.md</a>
    </p>
  </main>
</body>
</html>
