# Development override - enables live reload for both backend and frontend
# Usage: docker-compose -f docker-compose.yml -f docker-compose.override.yml up

services:
  backend:
    volumes:
      - ./backend-python:/app
      - uploads:/app/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - PYTHONDONTWRITEBYTECODE=1

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api}
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
      VITE_SUPABASE_STORAGE_KEY: ${VITE_SUPABASE_STORAGE_KEY:-klens-auth}
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./index.html:/app/index.html
      - ./vite.config.ts:/app/vite.config.ts
      - ./tailwind.config.ts:/app/tailwind.config.ts
      - frontend_node_modules:/app/node_modules
    command: npx vite --host 0.0.0.0 --port 80

volumes:
  frontend_node_modules:
