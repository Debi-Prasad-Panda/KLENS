services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: klens-postgres
    environment:
      POSTGRES_DB: klens
      POSTGRES_USER: klens_user
      POSTGRES_PASSWORD: klens_secure_password_2024
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U klens_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: klens-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    container_name: klens-neo4j
    environment:
      NEO4J_AUTH: neo4j/klens_neo4j_2024
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

  backend:
    build: 
      context: ./backend-python
      dockerfile: Dockerfile
    container_name: klens-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend-python/.env
    environment:
      DATABASE_URL: postgresql://klens_user:klens_secure_password_2024@postgres:5432/klens
      REDIS_URL: redis://redis:6379
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: klens_neo4j_2024
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_started
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: klens-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  uploads:

networks:
  default:
    name: klens-network
